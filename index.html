<html lang="pt">
<head>

<title>SBL Availability 2026</title>

<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2248%22 fill=%22%230077cc%22/><text x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 fill=%22white%22 font-family=%22sans-serif%22 font-weight=%22bold%22 font-size=%2235%22 dy=%22.3em%22>SBL</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%230077cc%22/><text x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 fill=%22white%22 font-family=%22sans-serif%22 font-weight=%22bold%22 font-size=%2235%22 dy=%22.3em%22>SBL</text></svg>">

<style>
  :root { 
    --primary-color: #0077cc; --accent-color: #0055aa; --logo-text-color: #ffffff;
    --bg-gray: #f8f9fa; --success: #25D366; --share-color: #6c757d;
  }
  body { 
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
    background: var(--bg-gray); text-align:center; padding:15px; color: #333; margin:0; 
    user-select: none; -webkit-user-select: none;
  }
  .app-container { max-width: 450px; margin: 0 auto; position: relative; padding-bottom: 30px; }
  
  .header-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 10px 5px; }
  .logo-circle {
    width: 60px; height: 60px; background: var(--primary-color); 
    color: var(--logo-text-color); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 18px; cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    transition: transform 0.2s; flex-shrink: 0;
  }

  .lang-box {
    position: absolute; top: 10px; right: 10px; background: white;
    border: 1px solid #ddd; border-radius: 12px; padding: 2px 8px;
    font-size: 11px; font-weight: bold; z-index: 100;
  }
  #langSelect { border: none; background: transparent; font-size: 11px; font-weight: 800; outline: none; cursor:pointer; }
  
  h1 { color: var(--primary-color); margin: 0 0 15px; font-size: 24px; font-weight: 800; }
  
  .selectors-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  select, .admin-input { padding:12px; font-size:14px; border-radius: 12px; width: 100%; background: white; border: 1px solid #ddd; font-weight: 600; box-sizing: border-box; outline:none; }
  .label-mini { font-size: 9px; font-weight: 800; color: #999; text-align: left; display: block; margin-bottom: 4px; text-transform: uppercase; }
  
  .legend-box { display: flex; justify-content: center; gap: 20px; margin: 15px 0; padding: 10px; background: #fff; border-radius: 12px; font-size: 13px; font-weight: 700; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
  
  .week-group { margin-bottom: 25px; text-align: left; }
  .week-title { text-align: center; font-weight: 700; color: var(--accent-color); margin: 20px 0 10px; display: flex; align-items: center; justify-content: center; gap: 8px; font-style: italic; }
  .day-row { display: grid; grid-template-columns: 1.6fr 1fr 0.6fr; align-items: center; padding: 12px 15px; background: #fff; margin-bottom: 8px; border-radius: 15px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
  .status-cell { font-size: 20px; text-align: right; min-width: 30px; }
  .day-name-cell { text-align: left; font-weight: 700; font-size: 17px; }
  .day-date-value { font-size: 13px; font-weight: 800; color: var(--primary-color); }
  
  .btn { width: 100%; padding: 16px; border: none; border-radius: 15px; color: #fff; font-weight: 800; font-size: 15px; cursor: pointer; margin-top: 10px; transition: opacity 0.2s; }
  
  .history-card { background: #fff; border-radius: 15px; padding: 15px; margin-top: 15px; border-left: 5px solid var(--success); text-align: left; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
  .history-time { font-size: 11px; font-weight: 800; color: var(--primary-color); display: block; margin-bottom: 5px; }
  .history-body { font-family: monospace; font-size: 11px; white-space: pre-wrap; color: #555; line-height: 1.3; }

  .footer-credits { margin-top: 40px; padding: 20px 0; border-top: 1px solid #eee; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .footer-text { font-size: 10px; font-weight: 900; color: #ccc; letter-spacing: 2px; text-transform: uppercase; }
  .support-link {
    display: flex; align-items: center; gap: 8px; background: #fff; padding: 8px 15px; 
    border-radius: 20px; text-decoration: none; color: #555; font-size: 12px; font-weight: 800;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #eee;
  }

  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
  .modal-content { background: white; border-radius: 20px; width: 90%; max-width: 420px; padding: 25px; box-sizing: border-box; max-height: 85vh; overflow-y: auto; position: relative; }
  
  .close-x {
    position: absolute; top: 15px; right: 15px; width: 30px; height: 30px;
    background: #f0f0f0; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-weight: 900; color: #999; cursor: pointer; font-size: 18px;
  }
</style>
</head>
<body>

<div class="app-container">
    <div class="lang-box">
        <select id="langSelect" onchange="changeLang(this.value)">
            <option value="pt">Português</option>
            <option value="en">English</option>
            <option value="ro">Română</option>
        </select>
    </div>

    <div class="header-nav">
        <div class="logo-circle" id="mainLogo">SBL</div>
        <div style="font-weight: 900; font-size: 10px; color: #ccc; letter-spacing: 1px;">VALTAIL SOLUTIONS</div>
    </div>

    <h1 id="displayAppName">Weekly Availability</h1>
    
    <div id="mainSelectors" class="selectors-grid">
        <div><span class="label-mini" id="lblQty">Quantidade</span><select id="weekSelect" onchange="renderWeeks()"></select></div>
        <div><span class="label-mini" id="lblJump">Semanas</span><select id="startWeekJump" onchange="renderWeeks()"></select></div>
    </div>

    <div class="legend-box">
        <span id="legAvail">✅ Disponível</span>
        <span id="legUnavail">❌ Indisponível</span>
    </div>

    <div id="weeksContainer"></div>

    <button id="sendBtn" class="btn" style="background:var(--success)">Enviar via WhatsApp</button>
    <div id="secondaryButtons" class="selectors-grid" style="margin-top:10px;">
        <button id="calBtn" class="btn" style="background:var(--primary-color); margin-top:0;">Calendário</button>
        <button id="shareBtn" class="btn" style="background:var(--share-color); margin-top:0;">Partilhar</button>
    </div>
    
    <div id="historySection" style="margin-top:30px; display:none;">
        <div style="display:flex; justify-content:space-between; font-size:9px; font-weight:900; color:#bbb; padding: 0 5px;">
            <span id="lblHistory">RELATÓRIOS RECENTES</span>
            <span id="clearHistoryBtn" style="color:red; cursor:pointer;">LIMPAR</span>
        </div>
        <div id="historyList"></div>
    </div>

    <footer class="footer-credits">
        <div class="footer-text">Valtail Solutions</div>
        <a href="https://wa.me/4407508309536?text=Olá! Preciso de suporte com o App." target="_blank" class="support-link">
            <span style="font-size:16px;">🎧</span> <span id="lblSupport">Suporte</span>
        </a>
    </footer>
</div>

<div id="faqModal" class="modal">
    <div class="modal-content">
        <div class="close-x" onclick="closeModal('faqModal')">×</div>
        <h2 id="faqTitle" style="color:var(--primary-color); margin-top:0; font-size: 20px; text-align: left;">Manual de Uso</h2>
        <div id="faqContent"></div>
    </div>
</div>

<div id="adminPanel" class="modal">
    <div class="modal-content">
        <div class="close-x" onclick="closeModal('adminPanel')">×</div>
        <h2 style="margin-top:0; text-align: left;">Painel Admin</h2>
        <div style="display:grid; gap:10px;">
            <input type="text" id="cfgAppName" class="admin-input" placeholder="Nome do Projeto">
            <input type="text" id="cfgIconInitials" class="admin-input" placeholder="Iniciais Logo">
            <input type="text" id="cfgCustomName" class="admin-input" placeholder="Nome Específico (Modo Evento)">
            <select id="cfgWaLang" class="admin-input"><option value="pt">WhatsApp: PT</option><option value="en">WhatsApp: EN</option><option value="ro">WhatsApp: RO</option></select>
            <input type="number" id="cfgMaxWeeks" class="admin-input" min="1" max="10" placeholder="Máx Semanas">
            <input type="color" id="cfgMainColor" class="admin-input" style="height:45px;">
            <input type="color" id="cfgAccentColor" class="admin-input" style="height:45px;">
            <select id="cfgStartDay" class="admin-input"><option value="0">Início: Domingo</option><option value="1">Início: Segunda</option></select>
            <div style="display:flex; align-items:center; background:#eee; padding:10px; border-radius:12px; justify-content: space-between;">
                <span style="font-size:12px; font-weight:800; color:#555;">MOSTRAR CALENDÁRIO</span>
                <input type="checkbox" id="cfgShowCal">
            </div>
        </div>
        <button id="saveConfig" class="btn" style="background:black; margin-top:15px;">Salvar Alterações</button>
    </div>
</div>

<script>
const LANGS = {
    pt: { 
        send: "Enviar via WhatsApp", cal: "Calendário", share: "Partilhar", qty: "Quantidade", jump: "Semanas", date: "DATA", week: "Semana", avail: "Disponível", unavail: "Indisponível", history: "RELATÓRIOS RECENTES", clear: "LIMPAR", faqT: "📖 Manual de Uso", support: "Suporte", ok: "FECHAR", days: ["Domingo", "Segunda-feira", "Terça-feira", "Quarta-feira", "Quinta-feira", "Sexta-feira", "Sábado"],
        manual: [
            {q: "📍 Como marcar dias?", a: "Toque em qualquer linha para alternar entre ✅ (Disponível) e ❌ (Indisponível)."},
            {q: "📲 Enviar para WhatsApp", a: "O botão verde gera um relatório pronto e abre seu WhatsApp automaticamente."},
            {q: "📅 Escolha de Período", a: "Em 'Quantidade' defina quantas semanas quer ver. Em 'Semanas' escolha o início."},
            {q: "🎭 Modo Evento", a: "Se ativo, o app foca apenas nesse evento e esconde os filtros de calendário."},
            {q: "📂 Histórico", a: "No fim da página consulte seus últimos 6 envios. Use 'LIMPAR' para apagar."},
            {q: "🗓️ Extras", a: "Azul: Agenda pessoal. Cinza: Compartilha o link deste app."},
            {q: "⚙️ Admin", a: "Pressione o logo por 3 segundos para mudar cores, nomes e configurações."},
            {q: "🎧 Suporte", a: "Dúvidas? Clique no link de suporte no rodapé para falar com a Valtail Solutions."}
        ]
    },
    en: { 
        send: "Send via WhatsApp", cal: "Calendar", share: "Share", qty: "Quantity", jump: "Weeks", date: "DATE", week: "Week", avail: "Available", unavail: "Unavailable", history: "RECENT REPORTS", clear: "CLEAR", faqT: "📖 User Manual", support: "Support", ok: "CLOSE", days: ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"],
        manual: [
            {q: "📍 How to mark days?", a: "Tap any row to toggle between ✅ (Available) and ❌ (Unavailable)."},
            {q: "📲 Send to WhatsApp", a: "The green button generates a report and opens WhatsApp automatically."},
            {q: "📅 Period Choice", a: "In 'Quantity' set how many weeks you want. In 'Weeks' choose the start."},
            {q: "🎭 Event Mode", a: "If active, the app focuses only on that event and hides calendar filters."},
            {q: "📂 History", a: "Check your last 6 sends at the bottom. Use 'CLEAR' to delete."},
            {q: "🗓️ Extras", a: "Blue: Personal calendar. Gray: Share the app link."},
            {q: "⚙️ Admin", a: "Long press the logo for 3 seconds to change colors and settings."},
            {q: "🎧 Support", a: "Questions? Click the support link in the footer to talk to Valtail Solutions."}
        ]
    },
    ro: { 
        send: "Trimite pe WhatsApp", cal: "Calendar", share: "Partajează", qty: "Cantitate", jump: "Săptămâni", date: "DATA", week: "Săptămâna", avail: "Disponibil", unavail: "Indisponibil", history: "RAPOARTE RECENTE", clear: "ȘTERGE", faqT: "📖 Manual de utilizare", support: "Suport", ok: "ÎNCHIDE", days: ["Duminică", "Luni", "Marți", "Miercuri", "Joi", "Vineri", "Sâmbătă"],
        manual: [
            {q: "📍 Cum se marchează zilele?", a: "Atingeți orice rând pentru a comuta între ✅ (Disponibil) și ❌ (Indisponibil)."},
            {q: "📲 Trimite pe WhatsApp", a: "Butonul verde generează un raport gata de trimis pe WhatsApp."},
            {q: "📅 Alegerea perioadei", a: "La 'Cantitate' alegeți numărul de săptămâni. La 'Săptămâni' alegeți începutul."},
            {q: "🎭 Mod Eveniment", a: "Dacă este activ, aplicația se concentrează doar pe acel eveniment."},
            {q: "📂 Istoric", a: "Consultați ultimele 6 trimiteri în josul paginii. Folosiți 'ȘTERGE'."},
            {q: "🗓️ Extras", a: "Albastru: Agenda personală. Gri: Trimite link-ul aplicației."},
            {q: "⚙️ Admin", a: "Apăsați lung pe logo timp de 3 secunde pentru setări."},
            {q: "🎧 Suport", a: "Întrebări? Contactați Valtail Solutions prin link-ul de suport."}
        ]
    }
};

let config = { appName: "Weekly Availability", iconInitials: "SBL", mainColor: "#0077cc", accentColor: "#0055aa", waLang: "pt", startDay: 0, maxWeeks: 3, customName: "", showCalendar: true };
let curLang = 'pt';
let history = [];
let selections = {};

function init() {
    const savedLang = localStorage.getItem('_v_lang'); if (savedLang) curLang = savedLang;
    const savedCfg = localStorage.getItem('_v_cfg_vFinalV8'); if (savedCfg) config = {...config, ...JSON.parse(savedCfg)};
    const savedHist = localStorage.getItem('_v_hist_smart_v4'); if (savedHist) history = JSON.parse(savedHist);
    const savedSels = localStorage.getItem('_v_sels'); if (savedSels) selections = JSON.parse(savedSels);
    document.getElementById('langSelect').value = curLang;

    applyStyles(); populateSelectors(); updateUI();
}

function applyStyles() {
    document.documentElement.style.setProperty('--primary-color', config.mainColor);
    document.documentElement.style.setProperty('--accent-color', config.accentColor);
    document.getElementById('displayAppName').textContent = config.appName;
    document.getElementById('mainLogo').textContent = config.iconInitials;
}

function updateUI() {
    const l = LANGS[curLang] || LANGS['pt'];
    
    document.getElementById('sendBtn').textContent = l.send;
    document.getElementById('calBtn').textContent = l.cal;
    document.getElementById('shareBtn').textContent = l.share;
    document.getElementById('lblQty').textContent = l.qty;
    document.getElementById('lblJump').textContent = l.jump;
    document.getElementById('lblHistory').textContent = l.history;
    document.getElementById('clearHistoryBtn').textContent = l.clear;
    document.getElementById('faqTitle').textContent = l.faqT;
    document.getElementById('lblSupport').textContent = l.support;
    document.getElementById('legAvail').textContent = `✅ ${l.avail}`;
    document.getElementById('legUnavail').textContent = `❌ ${l.unavail}`;

    document.getElementById('calBtn').style.display = config.showCalendar ? 'block' : 'none';
    document.getElementById('secondaryButtons').style.gridTemplateColumns = config.showCalendar ? '1fr 1fr' : '1fr';

    const faqCont = document.getElementById('faqContent'); faqCont.innerHTML = "";
    l.manual.forEach(m => faqCont.innerHTML += `<div style="text-align:left; border-bottom:1px solid #eee; padding:15px 0;"><b style="color:var(--primary-color); font-size:14px; display:block; margin-bottom:4px;">${m.q}</b><span style="font-size:12px; color:#555; line-height:1.4;">${m.a}</span></div>`);
    
    setupLogoActions(); renderWeeks(); renderHistory();
}

function getCurrentISOWeek() {
    const now = new Date();
    const startOfYear = new Date(now.getFullYear(), 0, 1);
    const days = Math.floor((now - startOfYear) / (24 * 60 * 60 * 1000));
    return Math.ceil((days + startOfYear.getDay() + 1) / 7);
}

function populateSelectors() {
    const l = LANGS[curLang] || LANGS['pt'];
    const qSel = document.getElementById('weekSelect'); qSel.innerHTML = "";
    for(let i=1; i<=config.maxWeeks; i++) qSel.innerHTML += `<option value="${i}">${i} ${l.week}${i>1?'s':''}</option>`;
    
    const nextWeek = getCurrentISOWeek() + 1;
    const jSel = document.getElementById('startWeekJump'); jSel.innerHTML = "";
    for(let i=0; i<config.maxWeeks; i++) {
        const wNum = nextWeek + i;
        jSel.innerHTML += `<option value="${wNum}">${l.week} ${wNum}</option>`;
    }
    jSel.value = nextWeek;
}

function getDateOfISOWeek(w, year) {
    let simple = new Date(year, 0, 1 + (w - 1) * 7);
    let ISOweekStart = simple;
    ISOweekStart.setDate(simple.getDate() - (simple.getDay() || 7) + 1);
    if(config.startDay == 0) ISOweekStart.setDate(ISOweekStart.getDate() - 1);
    return new Date(ISOweekStart);
}

function renderWeeks() {
    const container = document.getElementById("weeksContainer"); container.innerHTML = "";
    const qty = config.customName ? 1 : parseInt(document.getElementById("weekSelect").value);
    const startW = config.customName ? (getCurrentISOWeek() + 1) : parseInt(document.getElementById("startWeekJump").value);
    const l = LANGS[curLang] || LANGS['pt'];
    
    let dayIndices = config.startDay == 0 ? [0, 1, 2, 3, 4, 5, 6] : [1, 2, 3, 4, 5, 6, 0];

    document.getElementById('mainSelectors').style.display = config.customName ? 'none' : 'grid';

    for (let w = 0; w < qty; w++) {
        const targetW = startW + w;
        const group = document.createElement("div"); group.className = "week-group";
        const titleText = config.customName ? config.customName : `${l.week} ${targetW}`;
        group.innerHTML = `<div class="week-title" data-week-num="${targetW}">${titleText}</div>`;
        
        let weekBaseDate = getDateOfISOWeek(targetW, 2026);
        dayIndices.forEach((idx, offset) => {
            let dateObj = new Date(weekBaseDate); dateObj.setDate(weekBaseDate.getDate() + offset);
            const dStr = String(dateObj.getDate()).padStart(2, '0') + '/' + String(dateObj.getMonth() + 1).padStart(2, '0');
            const dayId = `${targetW}-${idx}`;
            const currentStatus = selections[dayId] || "✅";
            const row = document.createElement("div"); row.className = "day-row";
            row.style.opacity = currentStatus === "❌" ? "0.7" : "1";
            row.innerHTML = `<div class="day-name-cell">${l.days[idx]}</div><div style="text-align:center"><span style="font-size:8px; color:#bbb; display:block;">${l.date}</span><span class="day-date-value">${dStr}</span></div><div class="status-cell">${currentStatus}</div>`;
            row.onclick = () => {
                const s = row.querySelector(".status-cell");
                s.textContent = s.textContent === "✅" ? "❌" : "✅";
                row.style.opacity = s.textContent === "❌" ? "0.7" : "1";
                selections[dayId] = s.textContent;
                localStorage.setItem('_v_sels', JSON.stringify(selections));
            };
            group.appendChild(row);
        });
        container.appendChild(group);
    }
}

function setupLogoActions() {
    const logo = document.getElementById('mainLogo'); let t; let isLong = false;
    logo.onmousedown = logo.ontouchstart = () => { isLong = false; t = setTimeout(() => { isLong = true; openAdmin(); }, 3000); };
    logo.onmouseup = logo.ontouchend = () => { clearTimeout(t); if(!isLong) openModal('faqModal'); };
}

function openAdmin() {
    document.getElementById('cfgAppName').value = config.appName;
    document.getElementById('cfgIconInitials').value = config.iconInitials;
    document.getElementById('cfgCustomName').value = config.customName;
    document.getElementById('cfgWaLang').value = config.waLang;
    document.getElementById('cfgMaxWeeks').value = config.maxWeeks;
    document.getElementById('cfgMainColor').value = config.mainColor;
    document.getElementById('cfgAccentColor').value = config.accentColor;
    document.getElementById('cfgStartDay').value = config.startDay;
    document.getElementById('cfgShowCal').checked = config.showCalendar;
    openModal('adminPanel');
}

document.getElementById('saveConfig').onclick = () => {
    config.appName = document.getElementById('cfgAppName').value;
    config.iconInitials = document.getElementById('cfgIconInitials').value;
    config.customName = document.getElementById('cfgCustomName').value;
    config.waLang = document.getElementById('cfgWaLang').value;
    config.maxWeeks = parseInt(document.getElementById('cfgMaxWeeks').value);
    config.mainColor = document.getElementById('cfgMainColor').value;
    config.accentColor = document.getElementById('cfgAccentColor').value;
    config.startDay = parseInt(document.getElementById('cfgStartDay').value);
    config.showCalendar = document.getElementById('cfgShowCal').checked;
    localStorage.setItem('_v_cfg_vFinalV8', JSON.stringify(config));
    location.reload();
};

document.getElementById('sendBtn').onclick = () => {
    const l = LANGS[curLang] || LANGS['pt'];
    let msg = `*${config.appName}*\n\n✅ ${l.avail} | ❌ ${l.unavail}\n\n`;
    document.querySelectorAll('.week-group').forEach((g) => {
        const weekNum = g.querySelector('.week-title').getAttribute('data-week-num');
        const titleText = config.customName ? config.customName : `${l.week} ${weekNum}`;
        msg += `*${titleText}*\n\n`;
        g.querySelectorAll('.day-row').forEach(r => {
            const date = r.querySelector('.day-date-value').innerText;
            const currentDayName = r.querySelector('.day-name-cell').innerText;
            const dayIndex = l.days.indexOf(currentDayName);
            msg += `${r.querySelector('.status-cell').textContent}  ${date}  ${l.days[dayIndex]}\n`;
        });
        msg += `\n`;
    });
    msg += `\n_powered by valtail solutions_`;
    const now = new Date().toLocaleString();
    history.push({ time: now, content: msg });
    history = history.slice(-6);
    localStorage.setItem('_v_hist_smart_v4', JSON.stringify(history));
    window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`);
    renderHistory();
};

function renderHistory() {
    const list = document.getElementById('historyList'); list.innerHTML = "";
    if(history.length > 0) {
        document.getElementById('historySection').style.display = 'block';
        history.slice().reverse().forEach(h => {
            list.innerHTML += `<div class="history-card"><span class="history-time">${h.time}</span><div class="history-body">${h.content}</div></div>`;
        });
    }
}

document.getElementById('clearHistoryBtn').onclick = () => {
    if(confirm("Limpar histórico?")) { history = []; localStorage.removeItem('_v_hist_smart_v4'); renderHistory(); document.getElementById('historySection').style.display = 'none'; }
};

document.getElementById('shareBtn').onclick = () => {
    if (navigator.share) navigator.share({ title: config.appName, url: window.location.href });
    else prompt("Link:", window.location.href);
};

document.getElementById('calBtn').onclick = () => window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(config.appName)}`);

function openModal(id) { document.getElementById(id).style.display = 'flex'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }
function changeLang(v) { curLang = v; localStorage.setItem('_v_lang', v); updateUI(); populateSelectors(); }

window.onload = init;
</script>
</body>
</html>
